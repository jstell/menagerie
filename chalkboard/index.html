<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chalkboard</title>
<style>
  :root{
    --wall:#c9c1b2;
    --oak1:#8a6a45; --oak2:#6e5236; --oak3:#5f452c;
    --brass:#b08d3e; --brass-hi:#e3c87b;
    --slate-green1:#37604f; --slate-green2:#274437;
    --slate-black1:#333333; --slate-black2:#1e1e1e;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{
    background:
      radial-gradient(120% 90% at 50% 0%, rgba(255,255,255,.28), rgba(255,255,255,0) 60%),
      radial-gradient(140% 120% at 50% 118%, rgba(62,50,38,.38), rgba(62,50,38,0) 55%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='240' height='240' filter='url(%23n)' opacity='0.06'/></svg>"),
      var(--wall);
    font-family: Georgia, 'Times New Roman', serif;
    -webkit-user-select:none; user-select:none;
    touch-action:none;
  }
  #stage{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
  #unit{position:relative; width:min(96vw, 1500px);}

  /* ---------- frame & board ---------- */
  #frame{
    position:relative;
    padding:26px;
    border-radius:6px;
    background:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.012 0.35' numOctaves='3'/><feColorMatrix type='saturate' values='0'/></filter><rect width='300' height='300' filter='url(%23n)' opacity='0.16'/></svg>"),
      linear-gradient(180deg, var(--oak1), var(--oak2) 55%, var(--oak3));
    box-shadow:
      0 22px 45px -12px rgba(40,30,18,.55),
      0 3px 10px rgba(40,30,18,.35),
      inset 0 2px 2px rgba(255,240,210,.35),
      inset 0 -3px 4px rgba(30,20,10,.45);
  }
  #board{
    position:relative;
    height:min(70vh, 760px);
    min-height:340px;
    border-radius:3px;
    overflow:hidden;
    cursor:none;
    box-shadow:
      inset 0 6px 14px rgba(0,0,0,.55),
      inset 0 -2px 6px rgba(0,0,0,.35),
      inset 4px 0 10px rgba(0,0,0,.35),
      inset -4px 0 10px rgba(0,0,0,.35);
    background:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.045'/></svg>"),
      radial-gradient(130% 100% at 30% 20%, rgba(255,255,255,.05), rgba(0,0,0,.12) 75%),
      linear-gradient(160deg, var(--slate-green1), var(--slate-green2));
    transition: background .35s;
  }
  #board.black{
    background:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.045'/></svg>"),
      radial-gradient(130% 100% at 30% 20%, rgba(255,255,255,.06), rgba(0,0,0,.16) 75%),
      linear-gradient(160deg, var(--slate-black1), var(--slate-black2));
  }
  #marks{position:absolute;inset:0;width:100%;height:100%}

  /* brass fittings on the frame */
  .fitting{
    position:absolute; top:-1px; z-index:5;
    width:34px;height:24px; border:none; cursor:pointer;
    border-radius:0 0 8px 8px;
    background: linear-gradient(180deg, var(--brass-hi), var(--brass) 45%, #7a5f24);
    box-shadow: 0 2px 4px rgba(30,20,5,.5), inset 0 1px 1px rgba(255,255,230,.7);
    color:#3d2f10; font-size:12px; line-height:22px; text-align:center;
    font-family:Georgia,serif;
  }
  .fitting:hover{filter:brightness(1.08)}
  .fitting:focus-visible{outline:2px solid #fff;outline-offset:2px}
  #flip{right:34px}
  #flip .dot{display:inline-block;width:10px;height:10px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #5d8f78, #24382e); vertical-align:middle;
    box-shadow: inset 0 1px 1px rgba(255,255,255,.4), 0 1px 1px rgba(0,0,0,.4);}
  #mute{right:84px; font-size:13px}
  #mute.muted{color:#8a1f1f; text-decoration:line-through}

  /* ---------- tray ---------- */
  #tray{
    position:relative;
    margin:0 auto;
    width:calc(100% + 26px);
    left:-13px;
    height:58px;
    z-index:4;
  }
  #traybed{
    position:absolute; inset:0 0 14px 0;
    background:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.012 0.35' numOctaves='3'/><feColorMatrix type='saturate' values='0'/></filter><rect width='300' height='300' filter='url(%23n)' opacity='0.14'/></svg>"),
      linear-gradient(180deg, #7d5f3e, #6b4f32);
    box-shadow: inset 0 4px 8px rgba(35,24,12,.55);
  }
  #traylip{
    position:absolute; left:0; right:0; bottom:0; height:16px;
    border-radius:0 0 5px 5px;
    background:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.012 0.35' numOctaves='3'/><feColorMatrix type='saturate' values='0'/></filter><rect width='300' height='300' filter='url(%23n)' opacity='0.14'/></svg>"),
      linear-gradient(180deg, var(--oak1), var(--oak3));
    box-shadow: 0 10px 18px -6px rgba(40,30,18,.55), inset 0 1px 1px rgba(255,240,210,.4);
  }
  #piles{position:absolute; left:0; bottom:12px; width:100%; height:34px; pointer-events:none; z-index:2}

  /* ---------- tools ---------- */
  .tool{position:absolute; cursor:pointer; z-index:3; transition:transform .12s}
  .tool:hover{transform:translateY(-2px)}
  .tool.away{opacity:.16; filter:grayscale(.8); pointer-events:auto}
  .chalkstick{
    width:60px;height:12px;bottom:16px;border-radius:6px;
    background: linear-gradient(180deg, rgba(255,255,255,.65), var(--c) 40%, color-mix(in srgb, var(--c) 72%, #4a463c) 96%);
    box-shadow: 0 3px 3px rgba(30,20,10,.45);
  }
  .eraser{
    width:104px;height:38px;bottom:15px;
    border-radius:3px 3px 2px 2px;
    box-shadow: 0 4px 5px rgba(30,20,10,.5);
    background:
      linear-gradient(180deg, #4d3826 0 13px, #3b2a1c 13px 14px,
        #565a60 14px 20px, #42454b 20px 21px,
        #7e2f31 21px 27px, #5e2325 27px 28px,
        #565a60 28px 33px, #3c3f45 33px 38px);
  }
  .eraser.two{
    background:
      linear-gradient(180deg, #26343f 0 13px, #1c2830 13px 14px,
        #5b5e64 14px 20px, #46494f 20px 21px,
        #2f4d6e 21px 27px, #24394f 27px 28px,
        #5b5e64 28px 33px, #3e4147 33px 38px);
  }
  .hand{width:58px;height:58px;bottom:8px}
  .hand svg{width:100%;height:100%;filter:drop-shadow(0 3px 3px rgba(30,20,10,.45))}

  /* held tool follows the pointer */
  #held{position:fixed;left:0;top:0;z-index:60;pointer-events:none;will-change:transform}
  #held .chalkstick{position:absolute;right:0;top:-6px;transform-origin:100% 50%;transform:rotate(-42deg);bottom:auto;box-shadow:none}
  #held .chalkstick.side{right:auto;left:0;top:-7px;transform-origin:50% 50%;transform:translate(-50%,0) rotate(-9deg)}
  #held .eraser{position:absolute;left:-52px;top:-39px;bottom:auto;box-shadow:none}
  #held .hand{position:absolute;left:-29px;top:-10px;bottom:auto}
  #held.clapping{animation:clapShake .28s ease-out}
  @keyframes clapShake{
    0%{transform:var(--tf) rotate(0deg)} 25%{transform:var(--tf) translate(-7px,3px) rotate(-9deg)}
    55%{transform:var(--tf) translate(5px,-2px) rotate(6deg)} 100%{transform:var(--tf) rotate(0deg)}
  }
  .wiggle{animation:wig .3s ease-out}
  @keyframes wig{0%{transform:none}30%{transform:translateY(-4px) rotate(-4deg)}70%{transform:translateY(-1px) rotate(3deg)}100%{transform:none}}

  #dust{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:50}

  #plaque{
    margin-top:22px; text-align:center;
    color:#6d6355; font-size:12.5px; letter-spacing:.14em; text-transform:uppercase;
    text-shadow:0 1px 0 rgba(255,255,255,.5);
  }
  #plaque b{color:#57503f}
  @media (max-height:560px){ #plaque{display:none} }
</style>
</head>
<body>
<div id="stage">
  <div id="unit">
    <div id="frame">
      <div id="board">
        <canvas id="marks"></canvas>
      </div>
      <button class="fitting" id="flip" title="Flip board color (B)" aria-label="Flip board color"><span class="dot"></span></button>
      <button class="fitting" id="mute" title="Sound on/off (M)" aria-label="Toggle sound">&#9835;</button>
    </div>
    <div id="tray">
      <div id="traybed"></div>
      <canvas id="piles"></canvas>
      <div class="tool chalkstick" data-kind="chalk" data-color="#f4f1e9" style="--c:#f4f1e9;left:5%;transform:rotate(.6deg)" title="White chalk (1)"></div>
      <div class="tool chalkstick" data-kind="chalk" data-color="#efdf9d" style="--c:#efdf9d;left:11%;transform:rotate(-1deg)" title="Yellow chalk (2)"></div>
      <div class="tool chalkstick" data-kind="chalk" data-color="#f0c3cc" style="--c:#f0c3cc;left:17%;transform:rotate(1.4deg)" title="Pink chalk (3)"></div>
      <div class="tool chalkstick" data-kind="chalk" data-color="#b9d2ea" style="--c:#b9d2ea;left:23%;transform:rotate(-.8deg)" title="Blue chalk (4)"></div>
      <div class="tool eraser one" data-kind="eraser" style="left:56%" title="Eraser (E) — click the other eraser while holding one to clap"></div>
      <div class="tool eraser two" data-kind="eraser" style="left:66%;transform:rotate(.5deg)" title="Eraser — click it while holding the other to clap"></div>
      <div class="tool hand" data-kind="nail" style="right:4%" title="Fingernails (N)… if you must">
        <svg viewBox="0 0 64 64" aria-hidden="true">
          <defs>
            <linearGradient id="hskin" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#ecc39e"/><stop offset="1" stop-color="#c8996f"/>
            </linearGradient>
          </defs>
          <g fill="url(#hskin)" stroke="#a5764e" stroke-width="1.1" stroke-linejoin="round">
            <rect x="12" y="12" width="9" height="26" rx="4.5" transform="rotate(-6 16.5 25)"/>
            <rect x="23" y="7" width="9" height="30" rx="4.5" transform="rotate(-2 27.5 22)"/>
            <rect x="34" y="9" width="9" height="28" rx="4.5" transform="rotate(2 38.5 23)"/>
            <rect x="44.5" y="15" width="8.4" height="22" rx="4.2" transform="rotate(7 48.7 26)"/>
            <path d="M11.5 32 Q10 50 18 56 Q28 62.5 42 58.5 Q53 55 53.5 40 L53.5 31 Q33 40 11.5 32 Z"/>
            <path d="M52 36 Q60 32 61 40 Q61.5 47 54 51 Q50 53 48 49 Z"/>
          </g>
          <g fill="#f6e8d8" stroke="#caa07a" stroke-width="0.6">
            <ellipse cx="16" cy="16.5" rx="2.9" ry="3.4" transform="rotate(-6 16 16.5)"/>
            <ellipse cx="27.6" cy="11.5" rx="2.9" ry="3.5"/>
            <ellipse cx="38.9" cy="13.5" rx="2.9" ry="3.4" transform="rotate(2 38.9 13.5)"/>
            <ellipse cx="49" cy="19.5" rx="2.7" ry="3.1" transform="rotate(7 49 19.5)"/>
          </g>
          <g stroke="#b98960" stroke-width="0.9" fill="none" opacity="0.7">
            <path d="M14 27 q3 1.6 6 0"/><path d="M25 24 q3 1.6 6 0"/>
            <path d="M36 25.5 q3 1.6 6 0"/><path d="M46.5 29 q2.6 1.4 5.2 0"/>
          </g>
        </svg>
      </div>
      <div id="traylip"></div>
    </div>
    <div id="plaque">Slate No. 5 &nbsp;&middot;&nbsp; <b>1</b>&ndash;<b>4</b> chalk &nbsp; <b>shift</b> side of chalk &nbsp; <b>E</b> eraser &nbsp; <b>N</b> nails &nbsp; <b>B</b> board &nbsp; <b>space</b> clap held erasers &nbsp; <b>M</b> sound</div>
  </div>
</div>
<canvas id="dust"></canvas>
<div id="held"></div>

/* ============================== audio ============================== */
const AC = window.AudioContext || window.webkitAudioContext;
const actx = AC ? new AC() : null;
let master = null, muted = false;
const buffers = {}, loops = {};
const LOOP_NAMES = ['chalk-drag','chalk-write','eraser-wipe','nails'];

function b64buf(b64){
  const s = atob(b64), a = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) a[i] = s.charCodeAt(i);
  return a.buffer;
}
async function loadAudio(){
  if (!actx) return;
  master = actx.createGain();
  master.gain.value = 0.9;
  master.connect(actx.destination);
  await Promise.all(Object.keys(SOUNDS).map(async n => {
    buffers[n] = await actx.decodeAudioData(b64buf(SOUNDS[n]));
  }));
  for (const n of LOOP_NAMES){
    const src = actx.createBufferSource();
    src.buffer = buffers[n]; src.loop = true;
    const g = actx.createGain(); g.gain.value = 0;
    src.connect(g); g.connect(master); src.start();
    loops[n] = { src, g };
  }
}
const audioReady = loadAudio();
function unlockAudio(){ if (actx && actx.state === 'suspended') actx.resume(); }

function shot(name, rate = 1, gain = 1){
  if (!actx || !buffers[name] || muted) return;
  const s = actx.createBufferSource();
  s.buffer = buffers[name];
  s.playbackRate.value = rate;
  const g = actx.createGain();
  g.gain.value = gain;
  s.connect(g); g.connect(master);
  s.start();
}
function setLoop(name, gain, rate){
  const l = loops[name];
  if (!l) return;
  const t = actx.currentTime;
  l.g.gain.setTargetAtTime(muted ? 0 : gain, t, 0.045);
  if (rate) l.src.playbackRate.setTargetAtTime(rate, t, 0.06);
}
function silenceLoops(){ for (const n of LOOP_NAMES) setLoop(n, 0); }

function sizeCanvas(cv, w, h){
  cv.width = Math.round(w * DPR);
  cv.height = Math.round(h * DPR);

}
function layout(){

  sizeCanvas(pilesCv, pilesRect.width, pilesRect.height);

  if (nb !== bins){
    bins = nb;
    pileH = new Float32Array(bins);
    pileR = new Float32Array(bins); pileG = new Float32Array(bins); pileB = new Float32Array(bins);

}

/* ============================== chalk rendering ============================== */
function hexRgb(hex){
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function chalkDab(x, y, r, color, alpha){
  const n = Math.max(4, Math.floor(r * r * 1.15));
  mctx.fillStyle = color;
  for (let i = 0; i < n; i++){
    const a = Math.random() * 6.2832, d = Math.sqrt(Math.random()) * r;
    mctx.globalAlpha = alpha * (0.25 + Math.random() * 0.75);
    mctx.fillRect(x + Math.cos(a) * d, y + Math.sin(a) * d, 1.1, 1.1);
  }
  mctx.globalAlpha = 1;
}
function chalkSegment(x0, y0, x1, y1, color, speedN, pressure){
  const dist = Math.hypot(x1 - x0, y1 - y0);
  const steps = Math.max(1, Math.floor(dist / 1.8));
  const r = 3.4 * (0.85 + pressure * 0.35) * (1.05 - speedN * 0.35);
  const alpha = Math.max(0.28, 0.85 - speedN * 0.45);
  for (let i = 1; i <= steps; i++){
    if (speedN > 0.5 && Math.random() < (speedN - 0.4) * 0.55) continue; // chalk skips when fast
    const t = i / steps;
    chalkDab(x0 + (x1-x0) * t, y0 + (y1-y0) * t, r, color, alpha);
  }
}
function chalkSideSegment(x0, y0, x1, y1, color, speedN, L){
  const dx = x1 - x0, dy = y1 - y0, len = Math.hypot(dx, dy) || 1;
  const nx = -dy / len, ny = dx / len;          // band spreads perpendicular to travel
  const steps = Math.max(1, Math.floor(len / 2));
  mctx.fillStyle = color;
  for (let i = 1; i <= steps; i++){
    const t = i / steps;
    const cx = x0 + dx * t, cy = y0 + dy * t;
    const n = Math.floor(L * 0.8);
    for (let j = 0; j < n; j++){
      const u = Math.random() * 2 - 1;
      const edge = 1 - Math.pow(Math.abs(u), 1.6);
      mctx.globalAlpha = (0.06 + Math.random() * 0.16) * edge * (1 - speedN * 0.35);
      const d = u * L / 2;
      mctx.fillRect(cx + nx * d + (Math.random()-0.5)*2, cy + ny * d + (Math.random()-0.5)*2, 1.2, 1.2);
    }
  }
  mctx.globalAlpha = 1;
}

eraserBrush.width = 120; eraserBrush.height = 60;
{

let eraserLoad = 0.4;                 // how much chalk the felt is holding (0..1)
function eraserPrint(x, y, strength){
  // the signature felt-bar imprint a loaded eraser leaves when slapped flat
  const L = 94;
  const bars = [[-15, 5.5], [-6, 6], [3, 6], [11.5, 5]];   // laminations: y offset, height
  mctx.save();
  mctx.translate(x, y);
  mctx.rotate(heldTilt * 0.012 + (Math.random() - 0.5) * 0.06);
  mctx.fillStyle = 'rgb(241,239,233)';
  for (const [oy, hh] of bars){
    const n = Math.floor(L * hh * (0.12 + 0.5 * strength));
    for (let i = 0; i < n; i++){
      const u = Math.random() * 2 - 1;
      const edge = 1 - Math.pow(Math.abs(u), 2.2);      // bars fade out toward the ends
      mctx.globalAlpha = (0.08 + Math.random() * 0.32) * strength * edge;
      mctx.fillRect(u * L / 2, oy + Math.random() * hh, 1.1 + Math.random(), 1.1);
    }
  }
  mctx.restore();
  mctx.globalAlpha = 1;
}
function eraseAt(x, y, angle){
  eraserLoad = Math.min(1, eraserLoad + 0.012);
  mctx.save();
  mctx.translate(x, y);
  mctx.rotate(angle * 0.35 + (Math.random() - 0.5) * 0.08);
  mctx.globalCompositeOperation = 'destination-out';
  mctx.globalAlpha = 0.88;
  mctx.drawImage(eraserBrush, -60, -30);
  mctx.globalCompositeOperation = 'source-over';
  mctx.globalAlpha = 0.028;           // the smudge real erasers leave behind
  mctx.drawImage(eraserBrush, -60, -30);
  mctx.restore();
}
function nailSegment(x0, y0, x1, y1){
  const dx = x1 - x0, dy = y1 - y0, len = Math.hypot(dx, dy) || 1;
  const nx = -dy / len, ny = dx / len;      // perpendicular, for the 3 finger tracks
  mctx.strokeStyle = 'rgba(255,255,255,0.05)';
  mctx.lineWidth = 1.3;
  for (const off of [-7, 0, 7]){
    mctx.beginPath();
    mctx.moveTo(x0 + nx * off, y0 + ny * off);
    mctx.lineTo(x1 + nx * off, y1 + ny * off);
    mctx.stroke();
  }
}

/* ============================== dust particles & piles ============================== */
const particles = [];
let pilesDirty = true;
function spawnDust(x, y, count, rgb, spread, vy0){
  count = Math.round(count * particleScale);
  for (let i = 0; i < count; i++){
    if (particles.length > 2400) return;
    particles.push({
      x: x + (Math.random() - 0.5) * spread,
      y: y + (Math.random() - 0.5) * 4,
      vx: (Math.random() - 0.5) * 46,
      vy: vy0 + Math.random() * 30,
      sz: 0.7 + Math.random() * 1.3,
      a: 0.45 + Math.random() * 0.45,
      rgb, cloud: false
    });
  }
}
function spawnCloud(x, y, scale = 1){
  const n = Math.round(430 * scale * particleScale);
  for (let i = 0; i < n; i++){
    if (particles.length > 2400) break;
    const ang = Math.random() * 6.2832, sp = 25 + Math.random() * 210;
    particles.push({
      x, y,
      vx: Math.cos(ang) * sp,
      vy: Math.sin(ang) * sp * 0.7 - 30,
      sz: 3 + Math.random() * 8,
      a: 0.08 + Math.random() * 0.2,
      rgb: [235,233,228],
      cloud: true, grow: 1.2 + Math.random() * 2.2
    });
  }
  // plus some heavier grains that actually fall
  spawnDust(x, y, 80 * scale, [235,233,228], 90, 40);
}
function stepParticles(dt){
  const trayTop = pilesRect.bottom;
  for (let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    if (p.stick){
      p.vy += 900 * dt; p.x += p.vx * dt; p.y += p.vy * dt; p.ang += p.angV * dt;
      if (p.y > innerHeight + 20){ particles.splice(i, 1); continue; }
      if (!p.missed && p.y >= pilesRect.bottom - 9 && p.vy > 0){
        if (p.x > pilesRect.left + 10 && p.x < pilesRect.right - 10 && Math.random() < 0.85){
          makeStub(p.x, p.len, p.color);
          shot('chalk-tap', 0.55 + Math.random() * 0.1, 0.35);
          particles.splice(i, 1);
        } else {
          p.missed = true;                 // bounced off the lip, gone for good
          p.vx += (Math.random() - 0.5) * 80;
          p.vy *= 0.4;
        }
      }
      continue;
    }
    if (p.cloud){
      p.vx = p.vx * 0.972 + (Math.random() - 0.5) * 30 * dt;
      p.vy = p.vy * 0.972 + 12 * dt;
      p.sz += p.grow * dt * 10;
      p.a -= dt * 0.12;
    } else {
      p.vy += 480 * dt;
      p.vx *= 0.985;
    }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    if (p.a <= 0.01 || p.y > innerHeight + 10){ particles.splice(i, 1); continue; }
    if (!p.cloud && p.y >= trayTop - 2 - PILE_MAX && p.vy > 0){
      const bx = Math.floor((p.x - pilesRect.left) / BIN_W);
      if (bx >= 0 && bx < bins && p.y >= trayTop - 2 - pileH[bx]){
        if (Math.random() < 0.62 && pileH[bx] < PILE_MAX){
          const w = p.sz * 0.16;
          pileH[bx] = Math.min(PILE_MAX, pileH[bx] + w);
          pileR[bx] += p.rgb[0] * w; pileG[bx] += p.rgb[1] * w; pileB[bx] += p.rgb[2] * w;
          pilesDirty = true;
        }
        particles.splice(i, 1);
        continue;
      }
    }
  }
}
function drawParticles(){
  dctx.clearRect(0, 0, innerWidth, innerHeight);
  for (const p of particles){
    dctx.globalAlpha = Math.max(0, p.a);
    if (p.stick){
      dctx.save();
      dctx.translate(p.x, p.y);
      dctx.rotate(p.ang);
      dctx.fillStyle = p.color;
      if (dctx.roundRect){
        dctx.beginPath();
        dctx.roundRect(-p.len / 2, -6, p.len, 12, 6);
        dctx.fill();
      } else dctx.fillRect(-p.len / 2, -6, p.len, 12);
      dctx.globalAlpha = 0.35;
      dctx.fillStyle = '#fff';
      dctx.fillRect(-p.len / 2 + 4, -4, p.len - 8, 2.5);
      dctx.restore();
      continue;
    }
    dctx.fillStyle = `rgb(${p.rgb[0]},${p.rgb[1]},${p.rgb[2]})`;
    if (p.cloud){
      dctx.beginPath();
      dctx.arc(p.x, p.y, p.sz, 0, 6.2832);
      dctx.fill();
    } else {
      dctx.fillRect(p.x, p.y, p.sz, p.sz);
    }
  }
  dctx.globalAlpha = 1;
}
function drawPiles(){
  if (!pilesDirty) return;
  pilesDirty = false;
  const H = pilesRect.height;
  pctx.clearRect(0, 0, pilesRect.width, H);
  for (let i = 0; i < bins; i++){
    const hl = pileH[Math.max(0, i-1)], hr = pileH[Math.min(bins-1, i+1)];
    const h = (hl + pileH[i] * 2 + hr) / 4;
    if (h < 0.4) continue;
    const w = pileH[i] || 1;
    const r = Math.round(pileR[i] / w) || 240;
    const g = Math.round(pileG[i] / w) || 238;
    const b = Math.round(pileB[i] / w) || 232;
    const jit = pileJit[i];
    pctx.fillStyle = `rgba(${r},${g},${b},${0.75 + jit * 0.2})`;
    pctx.fillRect(i * BIN_W, H - h, BIN_W + 0.6, h);
    pctx.fillStyle = 'rgba(255,255,255,0.5)';
    pctx.fillRect(i * BIN_W, H - h, BIN_W + 0.6, 1);
  }
}

/* ============================== tools ============================== */
let held = null;                    // {kind, color, el(tray element)}
let pointer = { x: innerWidth/2, y: innerHeight/2 };
let heldTilt = 0;

let sideToggle = false;
function heldHTML(kind, color){
  if (kind === 'chalk') return `<div class="chalkstick" style="--c:${color};width:${held.len}px"></div>`;
  if (kind === 'eraser'){
    const cls = held && held.el.classList.contains('two') ? 'eraser two' : 'eraser one';
    return `<div class="${cls}"></div>`;
  }
  return `<div class="hand">${document.querySelector('.hand svg').outerHTML}</div>`;
}
function pickUp(el){
  if (held) putBack(false);
  held = {
    kind: el.dataset.kind,
    color: el.dataset.color || '#f4f1e9',
    el,
    len: parseFloat(el.dataset.len) || 60,
    side: false
  };
  el.classList.add('away');
  heldEl.innerHTML = heldHTML(held.kind, held.color);
  heldEl.style.display = 'block';
}
function setSide(s){
  if (!held || held.kind !== 'chalk' || held.side === s) return;
  held.side = s;
  const st = heldEl.querySelector('.chalkstick');
  if (st) st.classList.toggle('side', s);
}
function snapChalk(cx, cy){
  if (!held || held.kind !== 'chalk' || held.len < 34) return;
  const broken = Math.round(held.len * 0.42);
  held.len = Math.max(18, held.len - broken - 2);
  held.el.dataset.len = held.len;
  held.el.style.width = held.len + 'px';
  const st = heldEl.querySelector('.chalkstick');
  if (st) st.style.width = held.len + 'px';
  shot('chalk-snap', 0.9 + Math.random() * 0.25, 0.85);
  spawnDust(cx, cy, 12, hexRgb(held.color), 12, 30);
  particles.push({
    x: cx, y: cy,
    vx: (Math.random() - 0.5) * 90, vy: 30,
    ang: Math.random() * 3, angV: (Math.random() - 0.5) * 9,
    len: broken, color: held.color, a: 1, sz: 0,
    stick: true
  });
}
function makeStub(px, len, color){
  const tray = document.getElementById('tray');
  const tr = tray.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'tool chalkstick';
  el.dataset.kind = 'chalk';
  el.dataset.color = color;
  el.dataset.len = len;
  el.title = 'Chalk stub';
  const x = Math.min(tr.width - len - 8, Math.max(8, px - tr.left - len / 2));
  el.style.cssText = `--c:${color};left:${x}px;width:${len}px;transform:rotate(${(Math.random() - 0.5) * 5}deg)`;
  tray.insertBefore(el, document.getElementById('traylip'));
  attachTool(el);
}
function putBack(sound = true){
  if (!held) return;
  held.el.classList.remove('away');
  held.el.classList.add('wiggle');
  const el = held.el;
  setTimeout(() => el.classList.remove('wiggle'), 350);
  held = null;
  heldEl.style.display = 'none';
  heldEl.innerHTML = '';
  if (sound) shot('chalk-tap', 0.6 + Math.random() * 0.15, 0.35);
}
function clap(){
  if (!held || held.kind !== 'eraser') return;
  unlockAudio();
  shot('eraser-clap', 0.92 + Math.random() * 0.16, 0.95);
  spawnCloud(pointer.x, pointer.y);
  const px = pointer.x, py = pointer.y;
  setTimeout(() => spawnCloud(px - 60 + Math.random() * 120, py - 30 + Math.random() * 50, 0.5), 100);
  setTimeout(() => spawnCloud(px - 90 + Math.random() * 180, py - 40 + Math.random() * 60, 0.35), 220);
  eraserLoad = 0;                      // clapping shakes the felt clean
  heldEl.classList.remove('clapping');
  void heldEl.offsetWidth;
  heldEl.style.setProperty('--tf', heldEl.style.transform);
  heldEl.classList.add('clapping');
}
function moveHeld(){
  if (!held){ return; }
  const tilt = held.kind === 'eraser' ? Math.max(-14, Math.min(14, heldTilt)) : 0;
  heldEl.style.transform = `translate(${pointer.x}px, ${pointer.y}px) rotate(${tilt}deg)`;
}

function attachTool(el){
  el.addEventListener('pointerdown', e => {
    e.stopPropagation();
    unlockAudio();
    if (held && held.kind === 'eraser' && el.dataset.kind === 'eraser' && el !== held.el){
      el.classList.add('wiggle');
      setTimeout(() => el.classList.remove('wiggle'), 350);
      clap();
      return;
    }
    pickUp(el);
    shot('chalk-tap', 0.7 + Math.random() * 0.2, 0.3);
  });
}
document.querySelectorAll('.tool').forEach(attachTool);
document.getElementById('traybed').addEventListener('pointerdown', e => {
  e.stopPropagation();
  if (held) putBack();
});

/* ============================== drawing input ============================== */
let drawing = false, lx = 0, ly = 0, lastMoveT = 0, smSpeed = 0;

function boardXY(e){
  return [e.clientX - boardRect.left, e.clientY - boardRect.top];
}
function applyToolAudio(){
  if (!drawing || !held){ silenceLoops(); return; }
  const n = Math.min(1, smSpeed / 2.6);       // px/ms → 0..1
  if (n < 0.02){ silenceLoops(); return; }    // resting on the board makes no sound
  if (held.kind === 'chalk'){
    if (held.side){
      setLoop('chalk-drag', Math.min(1, n * 1.8) * 0.95, 0.7 + n * 0.3);
      setLoop('chalk-write', 0);
    } else {
      const fast = Math.min(1, Math.max(0, (n - 0.3) / 0.45));
      const vol = Math.min(1, n * 1.7) * 0.85;
      setLoop('chalk-drag',  vol * (1 - fast) * 0.9, 0.85 + n * 0.4);
      setLoop('chalk-write', vol * fast,             0.95 + n * 0.2);
    }
    setLoop('eraser-wipe', 0); setLoop('nails', 0);
  } else if (held.kind === 'eraser'){
    setLoop('eraser-wipe', Math.min(1, 0.12 + n * 1.5) * 0.9, 0.9 + n * 0.3);
    setLoop('chalk-drag', 0); setLoop('chalk-write', 0); setLoop('nails', 0);
  } else {
    setLoop('nails', Math.min(1, 0.1 + n * 1.6) * 0.8, 0.92 + n * 0.22);
    setLoop('chalk-drag', 0); setLoop('chalk-write', 0); setLoop('eraser-wipe', 0);
  }
}

marks.addEventListener('pointerdown', e => {
  unlockAudio();
  if (!held) return;
  try { marks.setPointerCapture(e.pointerId); } catch (_) {}
  drawing = true;
  [lx, ly] = boardXY(e);
  lastMoveT = performance.now();
  smSpeed = 0;
  if (held.kind === 'chalk'){
    setSide(sideToggle || e.shiftKey);
    if (held.side){
      shot('chalk-tap', 0.6 + Math.random() * 0.2, 0.4);
      chalkSideSegment(lx, ly, lx + 0.5, ly, held.color, 0, held.len * 0.8);
      spawnDust(e.clientX, e.clientY + 4, 6, hexRgb(held.color), held.len * 0.7, 20);
    } else {
      shot('chalk-tap', 0.85 + Math.random() * 0.35, 0.5);
      chalkDab(lx, ly, 3.2, held.color, 0.8);
      spawnDust(e.clientX, e.clientY + 4, 3, hexRgb(held.color), 6, 20);
    }
  } else if (held.kind === 'eraser'){
    // slapping the board leaves the signature felt-bar imprint
    shot('eraser-thump', 0.9 + Math.random() * 0.25, 0.3 + eraserLoad * 0.55);
    eraserPrint(lx, ly, 0.3 + eraserLoad * 0.7);
    spawnDust(e.clientX, e.clientY + 8, 5 + eraserLoad * 24, [235,233,228], 85, 18);
    eraserLoad = Math.max(0.05, eraserLoad - 0.18);
  } else {
    shot('chalk-tap', 1.45 + Math.random() * 0.25, 0.28);
  }
});
marks.addEventListener('pointermove', e => {
  if (!drawing || !held) return;
  const [x, y] = boardXY(e);
  const now = performance.now();
  const dt = Math.max(1, now - lastMoveT);
  const dist = Math.hypot(x - lx, y - ly);
  if (dist < 0.6) return;
  const inst = dist / dt;
  smSpeed += (inst - smSpeed) * 0.35;
  lastMoveT = now;
  const n = Math.min(1, smSpeed / 2.6);
  heldTilt = (x - lx) * 1.2;

  if (held.kind === 'chalk'){
    setSide(sideToggle || e.shiftKey);
    if (inst > 6 && held.len >= 34 && Math.random() < 0.3) snapChalk(e.clientX, e.clientY);
    if (held.side){
      chalkSideSegment(lx, ly, x, y, held.color, n, held.len * 0.8);
      spawnDust(e.clientX, e.clientY + 3, 2 + n * 14, hexRgb(held.color), held.len * 0.6, 15);
    } else {
      chalkSegment(lx, ly, x, y, held.color, n, e.pressure || 0.6);
      spawnDust(e.clientX, e.clientY + 3, 1 + n * 7, hexRgb(held.color), 5, 15);
    }
  } else if (held.kind === 'eraser'){
    const steps = Math.max(1, Math.floor(dist / 7));
    const ang = Math.atan2(y - ly, x - lx);
    for (let i = 1; i <= steps; i++){
      const t = i / steps;
      eraseAt(lx + (x-lx) * t, ly + (y-ly) * t, ang);
    }
    spawnDust(e.clientX, e.clientY + 16, 2 + n * 12, [232,230,225], 60, 25);
  } else {
    nailSegment(lx, ly, x, y);
  }
  applyToolAudio();
  lx = x; ly = y;
});
function endStroke(e){
  if (!drawing) return;
  drawing = false;
  smSpeed = 0;
  silenceLoops();
}
marks.addEventListener('pointerup', endStroke);
marks.addEventListener('pointercancel', endStroke);

addEventListener('pointermove', e => {
  pointer.x = e.clientX; pointer.y = e.clientY;
  if (held && held.kind === 'chalk' && !drawing) setSide(sideToggle || e.shiftKey);
  moveHeld();
});

/* ============================== fittings & keyboard ============================== */
const flipBtn = document.getElementById('flip');
const muteBtn = document.getElementById('mute');
function flipBoard(){
  board.classList.toggle('black');
  flipBtn.querySelector('.dot').style.background = board.classList.contains('black')
    ? 'radial-gradient(circle at 35% 30%, #666, #151515)'
    : 'radial-gradient(circle at 35% 30%, #5d8f78, #24382e)';
}
function toggleMute(){
  muted = !muted;
  muteBtn.classList.toggle('muted', muted);
  if (master) master.gain.setTargetAtTime(muted ? 0 : 0.9, actx.currentTime, 0.02);
  if (muted) silenceLoops();
}
flipBtn.addEventListener('click', e => { e.stopPropagation(); flipBoard(); });
muteBtn.addEventListener('click', e => { e.stopPropagation(); unlockAudio(); toggleMute(); });

/* the teacher would like a word (also: click the plaque) */
let teacherBusy = false;
function teacher(){
  if (teacherBusy || !actx || !buffers.teacher) return;
  teacherBusy = true;
  const rate = 0.95 + Math.random() * 0.04;   // near-native pitch; the sample is already low and slow
  shot('teacher', rate, 0.85);
  setTimeout(() => { teacherBusy = false; }, buffers.teacher.duration * 1000 / rate + 400);
}
document.getElementById('plaque').addEventListener('click', () => { unlockAudio(); teacher(); });

const chalkEls = [...document.querySelectorAll('.chalkstick')];
addEventListener('keydown', e => {
  if (e.repeat) return;
  const k = e.key.toLowerCase();
  if (k >= '1' && k <= '4') pickUp(chalkEls[+k - 1]);
  else if (k === 'e') pickUp(document.querySelector('.eraser.one'));
  else if (k === 'n') pickUp(document.querySelector('.hand'));
  else if (k === 's'){ sideToggle = !sideToggle; setSide(sideToggle); }
  else if (k === 'shift') setSide(true);
  else if (k === 'b') flipBoard();
  else if (k === 'm'){ unlockAudio(); toggleMute(); }
  else if (k === 't'){ unlockAudio(); teacher(); }
  else if (k === ' '){ e.preventDefault(); clap(); }
  else if (k === 'escape') putBack();
});
addEventListener('keyup', e => {
  if (e.key === 'Shift' && !sideToggle) setSide(false);
});

/* ============================== opening chalk & main loop ============================== */
function chalkText(str, x, y, size, align = 'center'){
  mctx.save();
  mctx.font = `${size}px "Segoe Print","Bradley Hand","Comic Sans MS",cursive`;
  mctx.textAlign = align;
  mctx.fillStyle = '#f4f1e9';
  for (const [ox, oy, a] of [[0,0,0.5],[0.8,0.5,0.3],[-0.6,0.7,0.25],[0.3,-0.5,0.2]]){
    mctx.globalAlpha = a;
    mctx.fillText(str, x + ox, y + oy);
  }
  // punch chalky holes in the letters
  const w = mctx.measureText(str).width;
  const x0 = align === 'center' ? x - w/2 : x;
  mctx.globalCompositeOperation = 'destination-out';
  const holes = Math.floor(w * size * 0.11);
  for (let i = 0; i < holes; i++){
    mctx.globalAlpha = 0.2 + Math.random() * 0.5;
    mctx.fillRect(x0 + Math.random() * w, y - size + Math.random() * size * 1.3,
                  0.8 + Math.random() * 1.4, 0.8 + Math.random() * 1.2);
  }
  mctx.restore();
}
function ghostSwipes(){
  // faint residue of long-erased lessons, so the slate doesn't look factory-new
  mctx.save();
  mctx.fillStyle = '#fff';
  for (let i = 0; i < 16; i++){
    const x = Math.random() * boardRect.width, y = Math.random() * boardRect.height;
    mctx.save();
    mctx.globalAlpha = 0.006 + Math.random() * 0.008;
    mctx.translate(x, y);
    mctx.rotate((Math.random() - 0.5) * 0.9);
    mctx.filter = 'blur(14px)';
    mctx.fillRect(-110, -26, 220, 52);
    mctx.restore();
  }
  mctx.restore();
}
function opening(){
  ghostSwipes();
  const w = boardRect.width, h = boardRect.height;
  chalkText('Pick up a piece of chalk from the tray.', w/2, h * 0.42, Math.max(20, w * 0.028));
  chalkText('Write. Tap. Erase me.', w/2, h * 0.42 + Math.max(30, w * 0.042), Math.max(16, w * 0.02));
}

let lastT = performance.now();
function frame(t){
  const dt = Math.min(0.05, (t - lastT) / 1000);
  lastT = t;
  if (drawing && t - lastMoveT > 90){
    smSpeed *= 0.7;
    applyToolAudio();
  }
  stepParticles(dt);
  drawParticles();
  drawPiles();
  requestAnimationFrame(frame);
}

layout();
opening();
// start with the white chalk in hand
pickUp(chalkEls[0]);
moveHeld();
requestAnimationFrame(frame);
addEventListener('pointerdown', unlockAudio, { once: false });

/* headless smoke test: index.html?selftest */
if (location.search.includes('selftest')){
  (async () => {
    try {
      await audioReady;
      console.log('AUDIO OK ' + Object.keys(buffers).length);
      const fire = (el, type, x, y, opts = {}) =>
        el.dispatchEvent(new PointerEvent(type, { clientX: x, clientY: y, bubbles: true, pointerId: 1, pressure: 0.6, ...opts }));
      const bx = boardRect.left + 120, by = boardRect.top + 120;
      fire(marks, 'pointerdown', bx, by);
      for (let i = 1; i <= 24; i++) fire(marks, 'pointermove', bx + i * 9, by + Math.sin(i * 0.6) * 30);
      fire(marks, 'pointerup', bx + 216, by);
      pickUp(document.querySelector('.eraser.one'));
      fire(marks, 'pointerdown', bx, by);
      for (let i = 1; i <= 12; i++) fire(marks, 'pointermove', bx + i * 12, by);
      fire(marks, 'pointerup', bx + 144, by);
      clap();
      // clean slap on a fresh spot: should leave the felt-bar imprint
      eraserLoad = 1;
      fire(marks, 'pointerdown', boardRect.left + 1050, boardRect.top + 80);
      fire(marks, 'pointerup', boardRect.left + 1050, boardRect.top + 80);
      pickUp(document.querySelector('.hand'));
      fire(marks, 'pointerdown', bx + 300, by);
      fire(marks, 'pointermove', bx + 310, by + 90);
      fire(marks, 'pointerup', bx + 310, by + 90);
      flipBoard();
      if (!location.search.includes('black')) flipBoard();
      pickUp(chalkEls[2]);
      fire(marks, 'pointerdown', bx, by + 160);
      for (let i = 1; i <= 24; i++) fire(marks, 'pointermove', bx + i * 9, by + 160 + Math.cos(i * 0.5) * 24);
      fire(marks, 'pointerup', bx + 216, by + 160);
      // side-of-chalk band
      pickUp(chalkEls[3]);
      fire(marks, 'pointerdown', bx + 500, by, { shiftKey: true });
      for (let i = 1; i <= 16; i++) fire(marks, 'pointermove', bx + 500 + i * 10, by + i * 4, { shiftKey: true });
      fire(marks, 'pointerup', bx + 660, by + 64);
      // snap a stick and let the piece land on the tray
      pickUp(chalkEls[1]);
      snapChalk(boardRect.left + 700, boardRect.top + 200);
      teacher();
      for (let i = 0; i < 400; i++) stepParticles(1/60);   // fast-forward the dust fall
      pilesDirty = true;
      console.log('SELFTEST OK particles=' + particles.length +
        ' piles=' + pileH.reduce((a,b)=>a+b,0).toFixed(1) +
        ' sticks=' + document.querySelectorAll('.chalkstick').length +
        ' heldLen=' + (held && held.len));
    } catch (err){
      console.error('SELFTEST FAIL: ' + err.stack);
    }
  })();
}
